name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            echo "Starting deployment..."

            cd /home/ubuntu

            # Clone repository if it does not exist
            if [ ! -d "aiops-config" ]; then
              echo "Repository not found. Cloning..."
              git clone https://github.com/RajatInDevOps/aiops-config.git
            fi

            # Ensure repository exists
            if [ ! -d "aiops-config" ]; then
              echo "Repository setup failed"
              exit 1
            fi

            cd aiops-config

            # Clean runtime-generated files to avoid git conflicts
            echo "Cleaning workspace..."
            rm -f app.log
            git clean -fd

            # Pull latest code
            echo "Pulling latest code..."
            git pull origin main

            # Show commit info (useful for debugging and rollback trace)
            echo "Current commit:"
            git log -1 --oneline

            echo "Previous commit:"
            git log -2 --oneline

            # Install dependencies
            echo "Installing dependencies..."
            npm install

            # Stop existing application
            echo "Stopping existing application..."
            sudo pkill node || true

            # Start application in background
            echo "Starting application..."
            nohup node app.js > app.log 2>&1 &

            # Optional health check
            echo "Performing health check..."
            sleep 5
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || true)

            echo "HTTP status: $STATUS"

            if [ "$STATUS" != "200" ]; then
              echo "Application is not healthy after deployment"
            else
              echo "Application is running successfully"
            fi

            echo "Deployment completed successfully"
